<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Credit Risk Prediction Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-4xl">

  <h1 class="text-3xl font-bold text-blue-700 mb-2">
    Credit Risk Prediction Dashboard
  </h1>
  <p class="text-gray-600 mb-6">
    Explainable AI powered credit scoring system
  </p>

  <input
    id="credit_amount"
    type="number"
    placeholder="Enter Credit Amount"
    class="w-full border rounded-xl p-3 mb-4"
  />

  <button onclick="predict()"
    class="w-full bg-gradient-to-r from-blue-600 to-indigo-600
           text-white py-3 rounded-xl font-semibold">
    Predict Credit Risk
  </button>

  <div id="result" class="mt-6 text-lg"></div>

  <div class="mt-6">
    <img id="bar" class="hidden rounded-xl shadow-lg" />
  </div>

</div>

<script>
async function predict() {

  const creditAmount = Number(document.getElementById("credit_amount").value);

  const res = await fetch("/predict", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      features: {
        "Credit amount": creditAmount
      }
    })
  });

  const data = await res.json();

  document.getElementById("result").innerHTML = `
    <b>Credit Amount:</b> ${creditAmount}<br>
    <b>Risk Score:</b> ${data.credit_score}<br>
    <b>Risk Level:</b>
    <span class="${data.risk === "High Risk" ? "text-red-600" : "text-green-600"} font-bold">
      ${data.risk}
    </span><br>
    <b>Confidence:</b>
    <span class="font-semibold text-indigo-600">
      ${data.confidence_level}
    </span>
  `;

  const img = document.getElementById("bar");
  img.src = "data:image/png;base64," + data.explanation_bar;
  img.classList.remove("hidden");
}
</script>

</body>
</html>
